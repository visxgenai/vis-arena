name: python-template-agent
version: 0.1.0
runtime:
  language: python
  python: ">=3.11"
commands:
  info: "./agent info --output agent-info.json"
  generate: "./agent generate --task task.md --data-dir data --output-dir output"
  evaluate: "./agent evaluate --task task.md --data-dir data --source-dir output/source --built-dir output/built --output evaluation.json"
llm:
  local:
    - OPENAI_API_KEY
    - ANTHROPIC_API_KEY
  cloud:
    - VIS_ARENA_API_TOKEN

