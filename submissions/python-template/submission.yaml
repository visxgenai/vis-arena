name: python-openai-template-agent
version: 0.3.0
runtime:
  language: python
  python: ">=3.11"
commands:
  info: "./agent.py info --output agent-info.json"
  generate: "./agent.py generate ."
  evaluate: "./agent.py evaluate ."
llm:
  providers:
    - openai
  local:
    - OPENAI_API_KEY
  cloud:
    - VIS_ARENA_API_TOKEN
    - VIS_ARENA_SERVER_URL
