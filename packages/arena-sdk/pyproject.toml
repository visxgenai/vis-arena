[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "vis-arena-sdk"
version = "0.1.0"
description = "Python SDK and CLI for Vis Arena"
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.27.0",
  "pydantic>=2.7.0",
  "typer>=0.12.0"
]

[project.scripts]
vis-arena = "vis_arena_sdk.cli:app"

[tool.setuptools.packages.find]
where = ["src"]

